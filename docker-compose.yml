services:
  db:
    image: postgres:16
    container_name: digital_deliveries_db
    restart: always
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: digital_deliveries
    ports:
      - "5432:5432"
    volumes:
      - digital_deliveries_pgdata:/var/lib/postgresql/data

volumes:
  digital_deliveries_pgdata:
